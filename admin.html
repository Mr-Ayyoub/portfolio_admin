<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Add Project</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <section class="admin-section">
    <div class="admin-container">
      <h1>Add New Project</h1>

      <form id="projectForm" class="admin-form">
        <div class="form-group">
          <label for="title">Project Title</label>
          <input type="text" id="title" placeholder="Enter project title" required />
        </div>

        <div class="form-group">
          <label for="description">Project Description</label>
          <textarea id="description" rows="5" placeholder="Enter project description" required></textarea>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select category</option>
            <option value="web-design">Web Design</option>
            <option value="front-end">Front End</option>
            <option value="graphic-design">Graphic Design</option>
            <option value="branding">Branding</option>
          </select>
        </div>

        <div class="form-group">
          <label for="images">Upload Project Images</label>
          <input type="file" id="images" accept="image/*" multiple required />
        </div>

        <div class="form-group">
          <label>Choose Cover Image</label>
          <div id="previewContainer" class="preview-container">
            <p class="preview-placeholder">Upload images first, then choose one as cover image.</p>
          </div>
        </div>

        <button type="submit" id="saveBtn" class="save-btn">Save Project</button>

        <p id="statusMessage" class="status-message"></p>
      </form>
    </div>
  </section>

  <script type="module" src="admin.js"></script>
</body>
</html>
